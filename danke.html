<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danke - MOCAR Auto Detailing</title>
  <meta name="description" content="Danke f&uuml;r Ihre Anfrage bei MOCAR. Wir melden uns schnellstm&ouml;glich bei Ihnen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .thanks-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      background: #0b0d12;
    }

    .thanks-card {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 2rem;
      text-align: center;
    }

    .thanks-card h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
    }

    .thanks-card p {
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <main class="thanks-page" aria-labelledby="thanks-title">
    <section class="thanks-card">
      <h1 id="thanks-title">Vielen Dank f&uuml;r Ihre Anfrage!</h1>
      <p>Wir haben Ihre Nachricht erhalten und melden uns schnellstm&ouml;glich bei Ihnen zur&uuml;ck.</p>
      <a href="index.html#kontakt" class="btn btn-primary">Zur&uuml;ck zur Website</a>
    </section>
  </main>
</body>
</html>
